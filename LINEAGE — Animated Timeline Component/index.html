<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINEAGE — Animated Timeline Component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="glow g1" aria-hidden="true"></div>
    <div class="glow g2" aria-hidden="true"></div>
    <div class="glow g3" aria-hidden="true"></div>

    <div class="app-shell">
      <!-- HEADER -->
      <header class="site-header">
        <div class="logo">
          <span class="logo-sym" aria-hidden="true">◎</span>
          <span class="logo-name">LINEAGE</span>
          <span class="logo-pill">Timeline</span>
        </div>
        <div class="hdr-right">
          <div class="hdr-socials">
            <a
              href="https://www.linkedin.com/in/azman08/"
              target="_blank"
              rel="noopener noreferrer"
              class="soc"
              aria-label="LinkedIn"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
            </a>
            <a
              href="https://github.com/azman08"
              target="_blank"
              rel="noopener noreferrer"
              class="soc"
              aria-label="GitHub"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                />
              </svg>
            </a>
            <a
              href="https://linktr.ee/codewithazman"
              target="_blank"
              rel="noopener noreferrer"
              class="soc linktree"
              aria-label="Linktree"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M7.953 15.066c-.08.163-.08.324-.08.486.08.517.528.897 1.052.818l2.678-.4v4.502c0 .64.48 1.15 1.12 1.15h.64c.64 0 1.12-.51 1.12-1.15v-4.502l2.678.4c.524.08.972-.3 1.052-.818 0-.162 0-.323-.08-.486l-4.22-8.394a1.136 1.136 0 0 0-2.032 0zm8.304-7.308l2.35-2.35a1.12 1.12 0 0 0 0-1.585 1.12 1.12 0 0 0-1.585 0l-2.35 2.35V3.5A1.5 1.5 0 0 0 13.172 2h-.344A1.5 1.5 0 0 0 11.328 3.5v2.673l-2.35-2.35a1.12 1.12 0 0 0-1.585 0 1.12 1.12 0 0 0 0 1.585l2.35 2.35H7.1a1.5 1.5 0 0 0-1.5 1.5v.344a1.5 1.5 0 0 0 1.5 1.5h2.743l-2.35 2.35a1.12 1.12 0 0 0 0 1.585 1.12 1.12 0 0 0 1.585 0l2.35-2.35v2.673a1.5 1.5 0 0 0 1.5 1.5h.344a1.5 1.5 0 0 0 1.5-1.5v-2.673l2.35 2.35a1.12 1.12 0 0 0 1.585 0 1.12 1.12 0 0 0 0-1.585l-2.35-2.35H16.9a1.5 1.5 0 0 0 1.5-1.5v-.344a1.5 1.5 0 0 0-1.5-1.5z"
                />
              </svg>
            </a>
          </div>
          <button class="icon-btn" id="btn-theme" aria-label="Toggle theme">
            <span id="theme-icon">☽</span>
          </button>
        </div>
      </header>

      <!-- HERO -->
      <section class="hero" aria-label="Hero">
        <div class="hero-badge">
          <span class="badge-dot" aria-hidden="true"></span>
          100 Days · 100 Projects
        </div>
        <h1 class="hero-title">Every moment<br /><em>has a place.</em></h1>
        <p class="hero-sub">
          4 layout variants. Scroll-triggered reveals. Live line draw. Rich
          interactions. Pure HTML, CSS & JS.
        </p>
      </section>

      <!-- CONTROLS -->
      <div class="controls-bar" role="toolbar" aria-label="Timeline controls">
        <div class="ctrl-group">
          <span class="ctrl-label">Layout</span>
          <div class="pill-row" role="group" aria-label="Layout">
            <button
              class="vpill active"
              data-variant="left"
              aria-pressed="true"
            >
              Left
            </button>
            <button class="vpill" data-variant="center" aria-pressed="false">
              Center
            </button>
            <button class="vpill" data-variant="right" aria-pressed="false">
              Right
            </button>
            <button
              class="vpill"
              data-variant="horizontal"
              aria-pressed="false"
            >
              Horizontal
            </button>
          </div>
        </div>
        <div class="ctrl-group">
          <span class="ctrl-label">Filter</span>
          <div class="pill-row" role="group" aria-label="Category filter">
            <button class="fpill active" data-cat="all" aria-pressed="true">
              All
            </button>
            <button class="fpill" data-cat="milestone" aria-pressed="false">
              Milestone
            </button>
            <button class="fpill" data-cat="project" aria-pressed="false">
              Project
            </button>
            <button class="fpill" data-cat="learning" aria-pressed="false">
              Learning
            </button>
            <button class="fpill" data-cat="launch" aria-pressed="false">
              Launch
            </button>
          </div>
        </div>
        <div class="ctrl-group ctrl-actions">
          <button class="act-btn primary" id="btn-replay">▶ Replay</button>
          <button class="act-btn" id="btn-expand">↕ Expand All</button>
          <button class="act-btn" id="btn-collapse">− Collapse All</button>
        </div>
      </div>

      <!-- TIMELINE -->
      <div class="tl-wrapper" id="tl-wrapper" aria-label="Timeline">
        <div class="tl-line-track" id="tl-line-track" aria-hidden="true">
          <div class="tl-line-fill" id="tl-line-fill"></div>
        </div>
        <div class="tl-items" id="tl-items" role="list"></div>
      </div>

      <!-- STATS -->
      <div class="stats-bar" aria-label="Timeline statistics">
        <div class="sstat">
          <span class="sstat-n mono" id="st-total">0</span
          ><span class="sstat-l">Events</span>
        </div>
        <div class="sstat-sep" aria-hidden="true"></div>
        <div class="sstat">
          <span class="sstat-n mono" id="st-ms">0</span
          ><span class="sstat-l">Milestones</span>
        </div>
        <div class="sstat-sep" aria-hidden="true"></div>
        <div class="sstat">
          <span class="sstat-n mono" id="st-proj">0</span
          ><span class="sstat-l">Projects</span>
        </div>
        <div class="sstat-sep" aria-hidden="true"></div>
        <div class="sstat">
          <span class="sstat-n mono" id="st-span">0</span
          ><span class="sstat-l">Year span</span>
        </div>
      </div>

      <!-- FOOTER -->
      <footer class="site-footer">
        <span>LINEAGE · 2026 · Every moment has a place.</span>
        <span class="ft-dot" aria-hidden="true">◎</span>
        <div class="ft-links">
          <a
            href="https://www.linkedin.com/in/azman08/"
            target="_blank"
            rel="noopener noreferrer"
            class="ft-link"
            >LinkedIn</a
          >
          <a
            href="https://github.com/azman08"
            target="_blank"
            rel="noopener noreferrer"
            class="ft-link"
            >GitHub</a
          >
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
