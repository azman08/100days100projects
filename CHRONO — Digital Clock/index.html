<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHRONO — Digital Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>
    <div class="glow-blob glow-1" aria-hidden="true"></div>
    <div class="glow-blob glow-2" aria-hidden="true"></div>
    <div class="glow-blob glow-3" aria-hidden="true"></div>

    <main class="app-shell">
      <!-- HEADER -->
<header class="site-header">
  <div class="logo-mark">
    <span class="logo-icon" aria-hidden="true">◈</span>
    <span class="logo-text">CHRONO</span>
  </div>

  <!-- Social Links -->
  <div class="header-socials">
    <a href="https://www.linkedin.com/in/azman08/" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="LinkedIn" title="LinkedIn">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">

      </svg>
    </a>
    <a href="https://github.com/azman08" target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="GitHub" title="GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">

      </svg>
    </a>
    <a href="https://linktr.ee/codewithazman" target="_blank" rel="noopener noreferrer" class="social-btn linktree-btn" aria-label="LinkTree" title="LinkTree">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">

  </div>

  <nav class="header-controls" aria-label="Clock controls">
    <button class="ctrl-btn" id="btn-format" aria-label="Toggle 12/24 hour format" title="Toggle 12/24h">
      <span class="ctrl-label" id="format-label">24H</span>
    </button>
    <button class="ctrl-btn" id="btn-seconds" aria-label="Toggle seconds" title="Toggle seconds">
      <span class="ctrl-label">SEC</span>
      <span class="toggle-pill active" id="sec-toggle" aria-hidden="true"></span>
    </button>
    <button class="ctrl-btn" id="btn-theme" aria-label="Toggle theme" title="Toggle theme">
      <span class="ctrl-label" id="theme-icon">☽</span>
    </button>
  </nav>
</header>

      <!-- CLOCK STAGE -->
      <section class="clock-stage" aria-label="Digital Clock">
        <div
          class="sr-only"
          aria-live="polite"
          aria-atomic="true"
          id="sr-time"
        ></div>

        <div class="date-strip">
          <span class="date-day" id="date-day"></span>
          <span class="date-sep" aria-hidden="true">—</span>
          <span class="date-full" id="date-full"></span>
          <span class="date-sep" aria-hidden="true">—</span>
          <span class="date-tz" id="date-tz"></span>
        </div>

        <div
          class="clock-display"
          id="clock-display"
          role="timer"
          aria-label="Current time"
        >
          <!-- Hours -->
          <div class="digit-group">
            <div class="digit-pair">
              <div class="digit-card" id="h-tens">
                <div class="digit-inner">
                  <span class="digit-current" id="ht-cur">0</span>
                  <span class="digit-next" id="ht-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">H</div>
              </div>
              <div class="digit-card" id="h-ones">
                <div class="digit-inner">
                  <span class="digit-current" id="ho-cur">0</span>
                  <span class="digit-next" id="ho-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">H</div>
              </div>
            </div>
          </div>

          <div class="colon-wrap" aria-hidden="true">
            <span class="colon-dot top" id="colon-top"></span>
            <span class="colon-dot bot" id="colon-bot"></span>
          </div>

          <!-- Minutes -->
          <div class="digit-group">
            <div class="digit-pair">
              <div class="digit-card" id="m-tens">
                <div class="digit-inner">
                  <span class="digit-current" id="mt-cur">0</span>
                  <span class="digit-next" id="mt-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">M</div>
              </div>
              <div class="digit-card" id="m-ones">
                <div class="digit-inner">
                  <span class="digit-current" id="mo-cur">0</span>
                  <span class="digit-next" id="mo-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">M</div>
              </div>
            </div>
          </div>

          <div class="colon-wrap" id="colon2-wrap" aria-hidden="true">
            <span class="colon-dot top" id="colon2-top"></span>
            <span class="colon-dot bot" id="colon2-bot"></span>
          </div>

          <!-- Seconds -->
          <div class="digit-group" id="group-seconds">
            <div class="digit-pair">
              <div class="digit-card" id="s-tens">
                <div class="digit-inner">
                  <span class="digit-current" id="st-cur">0</span>
                  <span class="digit-next" id="st-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">S</div>
              </div>
              <div class="digit-card" id="s-ones">
                <div class="digit-inner">
                  <span class="digit-current" id="so-cur">0</span>
                  <span class="digit-next" id="so-next">0</span>
                </div>
                <div class="digit-shine" aria-hidden="true"></div>
                <div class="digit-label">S</div>
              </div>
            </div>
          </div>

          <div class="ampm-badge" id="ampm-badge">
            <span id="ampm-text">AM</span>
          </div>
        </div>

        <!-- Seconds arc ring -->
        <div class="seconds-arc-wrap" aria-hidden="true">
          <svg
            class="seconds-arc-svg"
            viewBox="0 0 320 320"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle class="arc-track" cx="160" cy="160" r="152" />
            <circle
              class="arc-fill"
              id="arc-fill"
              cx="160"
              cy="160"
              r="152"
              stroke-dasharray="955.04"
              stroke-dashoffset="955.04"
            />
            <circle class="arc-dot" id="arc-dot" cx="160" cy="8" r="5" />
          </svg>
        </div>
      </section>

      <!-- METRICS ROW -->
      <section class="metrics-row" aria-label="Time metrics">
        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">⚡</span>
            <span class="metric-title">Milliseconds</span>
          </div>
          <div class="metric-value mono" id="ms-display">000</div>
          <div class="ms-bar-wrap" aria-hidden="true">
            <div class="ms-bar-track">
              <div class="ms-bar-fill" id="ms-bar"></div>
            </div>
          </div>
        </article>

        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">⌗</span>
            <span class="metric-title">Unix Timestamp</span>
          </div>
          <div class="metric-value mono" id="unix-display">0000000000</div>
          <div class="metric-sub">seconds since epoch</div>
        </article>

        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">◎</span>
            <span class="metric-title">Week Progress</span>
          </div>
          <div class="metric-value mono" id="week-display">0%</div>
          <div class="progress-ring-wrap" aria-hidden="true">
            <svg viewBox="0 0 60 60" class="progress-ring-svg">
              <circle class="pr-track" cx="30" cy="30" r="24" />
              <circle
                class="pr-fill"
                id="week-ring"
                cx="30"
                cy="30"
                r="24"
                stroke-dasharray="150.796"
                stroke-dashoffset="150.796"
              />
            </svg>
          </div>
        </article>

        <article class="metric-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">◉</span>
            <span class="metric-title">Year Progress</span>
          </div>
          <div class="metric-value mono" id="year-display">0%</div>
          <div class="progress-ring-wrap" aria-hidden="true">
            <svg viewBox="0 0 60 60" class="progress-ring-svg">
              <circle class="pr-track" cx="30" cy="30" r="24" />
              <circle
                class="pr-fill"
                id="year-ring"
                cx="30"
                cy="30"
                r="24"
                stroke-dasharray="150.796"
                stroke-dashoffset="150.796"
              />
            </svg>
          </div>
        </article>
      </section>

      <!-- BOTTOM ROW -->
      <section class="bottom-row" aria-label="Clock tools">
        <!-- Stopwatch -->
        <article class="tool-card stopwatch-card">
          <header class="tool-header">
            <span class="tool-title">Stopwatch</span>
            <span class="tool-badge">TOOL</span>
          </header>
          <div class="sw-display mono" id="sw-display" aria-live="polite">
            00:00:00.000
          </div>
          <div class="sw-controls">
            <button class="sw-btn sw-primary" id="sw-start">Start</button>
            <button class="sw-btn" id="sw-lap" disabled>Lap</button>
            <button class="sw-btn sw-danger" id="sw-reset">Reset</button>
          </div>
          <ol class="laps-list" id="laps-list" aria-label="Lap times"></ol>
        </article>

        <!-- World Clocks -->
        <article class="tool-card worldclock-card">
          <header class="tool-header">
            <span class="tool-title">World Clocks</span>
            <span class="tool-badge live-badge">LIVE</span>
          </header>
          <ul class="world-list" id="world-list" aria-label="World clocks"></ul>
        </article>
      </section>

<footer class="site-footer">

</footer>

</html>
