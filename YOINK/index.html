<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOINK — Copy to Clipboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>
    <div class="glow-blob glow-1" aria-hidden="true"></div>
    <div class="glow-blob glow-2" aria-hidden="true"></div>

    <!-- Toast notification -->
    <div
      class="toast-wrap"
      id="toast-wrap"
      aria-live="polite"
      aria-atomic="true"
    >
      <div class="toast" id="toast">
        <span class="toast-icon" id="toast-icon">✓</span>
        <span class="toast-msg" id="toast-msg">Copied to clipboard!</span>
      </div>
    </div>

    <main class="app-shell">
      <!-- HEADER -->
      <header class="site-header">
        <div class="logo-mark">
          <span class="logo-icon" aria-hidden="true">⌘</span>
          <span class="logo-text">YOINK</span>
        </div>
        <div class="header-socials">
          <a
            href="https://www.linkedin.com/in/azman08/"
            target="_blank"
            rel="noopener noreferrer"
            class="social-btn"
            aria-label="LinkedIn"
            title="LinkedIn"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
          </a>
          <a
            href="https://github.com/azman08"
            target="_blank"
            rel="noopener noreferrer"
            class="social-btn"
            aria-label="GitHub"
            title="GitHub"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
              />
            </svg>
          </a>
          <a
            href="https://linktr.ee/codewithazman"
            target="_blank"
            rel="noopener noreferrer"
            class="social-btn linktree-btn"
            aria-label="LinkTree"
            title="LinkTree"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M7.953 15.066c-.08.163-.08.324-.08.486.08.517.528.897 1.052.818l2.678-.4v4.502c0 .64.48 1.15 1.12 1.15h.64c.64 0 1.12-.51 1.12-1.15v-4.502l2.678.4c.524.08.972-.3 1.052-.818 0-.162 0-.323-.08-.486l-4.22-8.394a1.136 1.136 0 0 0-2.032 0zm8.304-7.308l2.35-2.35a1.12 1.12 0 0 0 0-1.585 1.12 1.12 0 0 0-1.585 0l-2.35 2.35V3.5A1.5 1.5 0 0 0 13.172 2h-.344A1.5 1.5 0 0 0 11.328 3.5v2.673l-2.35-2.35a1.12 1.12 0 0 0-1.585 0 1.12 1.12 0 0 0 0 1.585l2.35 2.35H7.1a1.5 1.5 0 0 0-1.5 1.5v.344a1.5 1.5 0 0 0 1.5 1.5h2.743l-2.35 2.35a1.12 1.12 0 0 0 0 1.585 1.12 1.12 0 0 0 1.585 0l2.35-2.35v2.673a1.5 1.5 0 0 0 1.5 1.5h.344a1.5 1.5 0 0 0 1.5-1.5v-2.673l2.35 2.35a1.12 1.12 0 0 0 1.585 0 1.12 1.12 0 0 0 0-1.585l-2.35-2.35H16.9a1.5 1.5 0 0 0 1.5-1.5v-.344a1.5 1.5 0 0 0-1.5-1.5z"
              />
            </svg>
          </a>
        </div>
        <button
          class="ctrl-btn"
          id="btn-theme"
          aria-label="Toggle theme"
          title="Toggle theme"
        >
          <span id="theme-icon">☽</span>
        </button>
      </header>

      <!-- HERO -->
      <section class="hero">
        <div class="hero-badge">
          <span class="badge-dot" aria-hidden="true"></span>
          100 Days · 100 Projects
        </div>
        <h1 class="hero-title">
          Copy to <span class="accent-text">Clipboard</span>
        </h1>
        <p class="hero-sub">
          Click any card to instantly copy. Write your own. History saved.
        </p>
      </section>

      <!-- CUSTOM INPUT -->
      <section class="custom-section" aria-label="Custom text input">
        <div class="input-card">
          <label class="input-label" for="custom-input">
            <span class="input-label-icon" aria-hidden="true">✎</span>
            Custom Text
          </label>
          <div class="input-row">
            <textarea
              id="custom-input"
              class="custom-textarea"
              placeholder="Type or paste anything here..."
              rows="3"
              aria-label="Enter custom text to copy"
              spellcheck="false"
            ></textarea>
            <button
              class="copy-btn copy-btn-primary"
              id="copy-custom"
              aria-label="Copy custom text"
            >
              <span class="copy-btn-icon" aria-hidden="true" id="custom-icon">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" />
                  <path
                    d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                  />
                </svg>
              </span>
              <span class="copy-btn-label">Copy</span>
            </button>
          </div>
          <div class="char-count" id="char-count">0 characters</div>
        </div>
      </section>

      <!-- FILTER TABS -->
      <div class="filter-tabs" role="tablist" aria-label="Snippet categories">
        <button
          class="tab active"
          data-filter="all"
          role="tab"
          aria-selected="true"
        >
          All
        </button>
        <button class="tab" data-filter="dev" role="tab" aria-selected="false">
          Dev
        </button>
        <button
          class="tab"
          data-filter="social"
          role="tab"
          aria-selected="false"
        >
          Social
        </button>
        <button
          class="tab"
          data-filter="email"
          role="tab"
          aria-selected="false"
        >
          Email
        </button>
        <button
          class="tab"
          data-filter="design"
          role="tab"
          aria-selected="false"
        >
          Design
        </button>
      </div>

      <!-- SNIPPETS GRID -->
      <section
        class="snippets-grid"
        id="snippets-grid"
        aria-label="Snippet cards"
      >
        <!-- Populated by JS -->
      </section>

      <!-- CLIPBOARD HISTORY -->
      <section class="history-section" aria-label="Copy history">
        <div class="history-header">
          <div class="section-label">
            <span class="label-dot" aria-hidden="true"></span>
            Copy History
          </div>
          <button
            class="clear-btn"
            id="clear-history"
            aria-label="Clear history"
          >
            Clear
          </button>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty" id="history-empty">
            <span aria-hidden="true">◌</span>
            Nothing copied yet
          </div>
        </div>
      </section>

      <!-- FOOTER -->
      <footer class="site-footer">
        <span class="footer-text">CLIPX · 2026 · Copy Fast</span>
        <span class="footer-dot" aria-hidden="true">⌘</span>
        <div class="footer-links">
          <a
            href="https://www.linkedin.com/in/azman08/"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
            >LinkedIn</a
          >
          <a
            href="https://github.com/azman08"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
            >GitHub</a
          >
        </div>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
